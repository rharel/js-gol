<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game of Life</title>

    <link rel="stylesheet" type="text/css"
          href="css/animation.css">
    <link rel="stylesheet" type="text/css"
          href="css/demo.css">

    <script src="bower_components/js-gol/dist/gol.min.js"></script>

    <script src="js/CanvasView.js"></script>
    <script src="js/Animation.js"></script>
    <script src="js/rle.js"></script>
    <script src="js/demo.js"></script>
</head>
<body>
    <div id="content">
        <h1>
            <a href="https://www.github.com/rharel/js-gol">
                rharel/js-gol
            </a>
        </h1>

        <div class="animation-container">
            <canvas id="glider" class="animation"
                    width="150" height="150">
            </canvas>
            <div class="overlay" onclick="Gol.toggle_animation('glider')">
                <div class="play-button">
                    <div class="play-symbol"></div>
                </div>
            </div>
        </div>
        <div class="animation-container">
            <canvas id="heavyweight-spaceship" class="animation"
                    width="250" height="150">
            </canvas>
            <div class="overlay" onclick="Gol.toggle_animation('heavyweight-spaceship')">
                <div class="play-button">
                    <div class="play-symbol"></div>
                </div>
            </div>
        </div>
        <div class="animation-container">
            <canvas id="pulsar" class="animation"
                    width="150" height="150">
            </canvas>
            <div class="overlay" onclick="Gol.toggle_animation('pulsar')">
                <div class="play-button">
                    <div class="play-symbol"></div>
                </div>
            </div>
        </div>
        <div class="animation-container">
            <canvas id="queen-bee-shuttle" class="animation"
                    width="300" height="113">
            </canvas>
            <div class="overlay" onclick="Gol.toggle_animation('queen-bee-shuttle')">
                <div class="play-button">
                    <div class="play-symbol"></div>
                </div>
            </div>
        </div>
        <div class="animation-container">
            <canvas id="gosper-glider-gun" class="animation"
                    width="300" height="174">
            </canvas>
            <div class="overlay" onclick="Gol.toggle_animation('gosper-glider-gun')">
                <div class="play-button">
                    <div class="play-symbol"></div>
                </div>
            </div>
        </div>
        <div class="animation-container">
            <canvas id="r-pentomino" class="animation"
                    width="300" height="188">
            </canvas>
            <div class="overlay" onclick="Gol.toggle_animation('r-pentomino')">
                <div class="play-button">
                    <div class="play-symbol"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
