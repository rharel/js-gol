<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game of Life</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/demo.css">

    <script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js"></script>
    <script src="dist/gol.js"></script>

    <script src="js/rle.js"></script>
    <script src="js/Renderer.js"></script>
    <script src="js/Player.js"></script>

    <script>
        $(document).ready(function() {

            var $canvas = $('#main-canvas');

            var world = new Gol.World(16, 16);
            var renderer = new Renderer($canvas[0], world);

            // resizing //

            var $rowControls = $('#row-controls');

            function resizeCanvas() {

                var margin = 40;

                $canvas[0].width = $canvas.parent().width();
                $canvas[0].height = window.innerHeight - $rowControls.height() - margin;

                requestAnimationFrame(renderer.render.bind(renderer));
            }

            $(window).resize(resizeCanvas);

            // stepping //

            var player = new Player(renderer, 2);

            var $playButton = $('#play-pause-btn');
            var $playButtonLabel = $('#play-button-label');

            $playButton.click(function() {

                if (player.running) {

                    player.stop();

                    $playButtonLabel.removeClass('glyphicon-pause');
                    $playButtonLabel.addClass('glyphicon-play');
                }

                else {

                    player.play();

                    $playButtonLabel.removeClass('glyphicon-play');
                    $playButtonLabel.addClass('glyphicon-pause');
                }
            });

            var $fpsIncreaseButton = $('#fps-increase-btn');

            $fpsIncreaseButton.click(function() {

                player.fps = Math.min(2 * player.fps, 30);
            });

            var $fpsDecreaseButton = $('#fps-decrease-btn');

            $fpsDecreaseButton.click(function() {

                player.fps = Math.max(0.5 * player.fps, 1);
            });

            // patterns //

            var patterns = {

                // oscillators //

                blinker: {
                    width: 5,
                    height: 5,
                    rle: '3o!'
                },

                pulsar: {
                    width: 17,
                    height: 17,
                    rle:'2b3o3b3o2b2$o4bobo4bo$o4bobo4bo$o4bobo4bo$2b3o3b3o2b2$2b3o3b3o2b$o4bob' +
                        'o4bo$o4bobo4bo$o4bobo4bo2$2b3o3b3o!'
                },

                pinwheel: {
                    width: 14,
                    height: 14,
                    rle: '6b2o4b$6b2o4b2$4b4o4b$2obo4bo3b$2obo2bobo3b$3bo3b2ob2o$3bobo2bob2o$4b' +
                         '4o4b2$4b2o6b$4b2o!'
                },

                // spaceships //

                glider: {
                    width: 16,
                    height: 16,
                    rle: 'bob$2bo$3o!'
                },

                brain: {
                    width: 64,
                    height: 64,
                    rle: 'b3o9b3ob$obob2o5b2obobo$obobo7bobobo$bob2ob2ob2ob2obob$5bobobobo5b$3bo' +
                         'bobobobobo3b$2b2obobobobob2o2b$2b3o2bobo2b3o2b$2b2o2bo3bo2b2o2b$bo4b2o' +
                         'b2o4bob$bo13bo!'
                },

                dart: {
                    width: 32,
                    height: 32,
                    rle: '7bo7b$6bobo6b$5bo3bo5b$6b3o6b2$4b2o3b2o4b$2bo3bobo3bo2b$b2o3bobo3b2ob$' +
                         'o5bobo5bo$bob2obobob2obo!'
                },

                // puffers //

                'backrake 1': {
                    width: 64,
                    height: 64,
                    rle: '5b3o11b3o5b$4bo3bo9bo3bo4b$3b2o4bo7bo4b2o3b$2bobob2ob2o5b2ob2obobo2b$b' +
                         '2obo4bob2ob2obo4bob2ob$o4bo3bo2bobo2bo3bo4bo$12bobo12b$2o7b2obobob2o7b' +
                         '2o$12bobo12b$6b3o9b3o6b$6bo3bo9bo6b$6bobo4b3o11b$12bo2bo4b2o5b$15bo11b' +
                         '$11bo3bo11b$11bo3bo11b$15bo11b$12bobo!'
                },

                'puffer 1': {
                    width: 64,
                    height: 64,
                    rle: 'b3o6bo5bo6b3ob$o2bo5b3o3b3o5bo2bo$3bo4b2obo3bob2o4bo3b$3bo19bo3b$3bo2b' +
                         'o13bo2bo3b$3bo2b2o11b2o2bo3b$2bo3b2o11b2o3bo!'
                },

                'blinker puffer 1': {
                    width: 64,
                    height: 64,
                    rle: '3bo5b$bo3bo3b$o8b$o4bo3b$5o4b4$b2o6b$2ob3o3b$b4o4b$2b2o5b2$5b2o2b$3bo' +
                         '4bo$2bo6b$2bo5bo$2b6o!'
                }
            };

            function loadPattern(name) {

                var pattern = patterns[name.toLowerCase()];

                var data = parseRLE(pattern.rle);
                var width = pattern.hasOwnProperty('width') ? pattern.width : data.width + 2;
                var height = pattern.hasOwnProperty('height') ? pattern.height : data.height + 2;
                var offset = {
                    x: Math.round(0.5 * (width - data.width)),
                    y: Math.round(0.5 * (height - data.height))
                };

                var world = new Gol.World(width, height);

                data.cells.forEach(function(cell) {

                    world.spawn(offset.x + cell.x, offset.y + cell.y);
                });

                renderer.world = world;
                renderer.render();
            }

            var $patternButton = $('.pattern-btn');

            $patternButton.click(function(e) {

                loadPattern(e.target.innerHTML);
            });

            // kickstart //

            loadPattern('pulsar');

            resizeCanvas();
            renderer.render();

            $playButton.trigger('click');
        });
    </script>
</head>
<body>

    <div class="container-fluid container-fill">

        <div id="row-controls" class="row row-controls">

            <div class="col-md-offset-5 col-md-2">

                <a id="play-pause-btn" class="btn btn-primary btn-lg">
                    <span id="play-button-label" class="glyphicon glyphicon-play"></span>
                </a>
                <a id="fps-increase-btn" class="btn btn-primary btn-lg">
                    <span class="glyphicon glyphicon-plus"></span>
                </a>
                <a id="fps-decrease-btn" class="btn btn-primary btn-lg">
                    <span class="glyphicon glyphicon-minus"></span>
                </a>
            </div>

            <div class="col-md-1">

                <div id="pattern-dropdown" class="dropdown">
                    <button id="pattern-menu-button" class="btn btn-default dropdown-toggle"
                            type="button"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="true">

                        Patterns
                        <span class="caret"></span>
                    </button>
                    <ul id='pattern-menu' class="dropdown-menu" aria-labelledby="pattern-menu-button">
                        <li class="dropdown-header">Oscillators</li>
                        <li><a class="pattern-btn" href="#">Blinker</a></li>
                        <li><a class="pattern-btn" href="#">Pulsar</a></li>
                        <li><a class="pattern-btn" href="#">Pinwheel</a></li>

                        <li class="dropdown-header">Spaceships</li>
                        <li><a class="pattern-btn" href="#">Glider</a></li>
                        <li><a class="pattern-btn" href="#">Brain</a></li>
                        <li><a class="pattern-btn" href="#">Dart</a></li>

                        <li class="dropdown-header">Puffers</li>
                        <li><a class="pattern-btn" href="#">Backrake 1</a></li>
                        <li><a class="pattern-btn" href="#">Puffer 1</a></li>
                        <li><a class="pattern-btn" href="#">Blinker puffer 1</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row row-canvas">

            <canvas id="main-canvas">

                Sorry, your browser does not support HTML5 canvas :(
            </canvas>
        </div>
    </div>
</body>
</html>
